<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>binder-qa Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 40px; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #00d4ff; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #16213e; padding: 20px 30px; border-radius: 8px; text-align: center; flex: 1; }
        .stat-card .number { font-size: 36px; font-weight: bold; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
        .pass { color: #2ecc71; }
        .fail { color: #e74c3c; }
        .in_progress { color: #f39c12; }
        .unknown { color: #888; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th { background: #0f3460; padding: 12px 16px; text-align: left; font-size: 13px; color: #00d4ff; }
        td { padding: 12px 16px; border-bottom: 1px solid #0f3460; font-size: 13px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #0f3460; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge.PASS { background: #1a4a2e; color: #2ecc71; }
        .badge.FAIL { background: #4a1a1a; color: #e74c3c; }
        .badge.IN_PROGRESS { background: #4a3a1a; color: #f39c12; }
        .badge.UNKNOWN { background: #333; color: #888; }
        a { color: #00d4ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .empty { text-align: center; padding: 60px; color: #555; }
        .refresh { float: right; background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff; 
                   padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .refresh:hover { background: #00d4ff; color: #1a1a2e; }
    </style>
</head>
<body>
    <h1>🧪 binder-qa</h1>
    <p class="subtitle">Agentic QA Test Dashboard</p>

    <div class="stats">
        <div class="stat-card">
            <div class="number" id="total">—</div>
            <div class="label">TOTAL RUNS</div>
        </div>
        <div class="stat-card">
            <div class="number pass" id="passes">—</div>
            <div class="label">PASSED</div>
        </div>
        <div class="stat-card">
            <div class="number fail" id="fails">—</div>
            <div class="label">FAILED</div>
        </div>
        <div class="stat-card">
            <div class="number" id="avg-steps">—</div>
            <div class="label">AVG STEPS</div>
        </div>
    </div>

    <button class="refresh" onclick="loadReports()">⟳ Refresh</button>
    <table>
        <thead>
            <tr>
                <th>Run ID</th>
                <th>Test Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Steps</th>
                <th>Final Status</th>
                <th>Verdict</th>
                <th>Report</th>
            </tr>
        </thead>
        <tbody id="report-table">
            <tr><td colspan="8" class="empty">Loading reports...</td></tr>
        </tbody>
    </table>

    <script>
        async function loadReports() {
            const tbody = document.getElementById("report-table");
            tbody.innerHTML = `<tr><td colspan="8" class="empty">Loading...</td></tr>`;

            let index;
            try {
                const res = await fetch("reports/index.json");
                if (!res.ok) throw new Error("No index found");
                index = await res.json();
            } catch {
                tbody.innerHTML = `<tr><td colspan="8" class="empty">
                    No reports found. Run <strong>python tests/agent_test.py</strong> first, 
                    then run <strong>python build_index.py</strong> to index reports.
                </td></tr>`;
                return;
            }

            if (!index.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty">No reports indexed yet.</td></tr>`;
                return;
            }

            let passes = 0, fails = 0, totalSteps = 0;
            let rows = "";

            for (const r of index) {
                const status = (r.final_status || "UNKNOWN").toUpperCase();
                if (status === "PASS") passes++;
                if (status === "FAIL") fails++;
                totalSteps += r.steps || 0;

                const date = r.run_id ? r.run_id.substring(0, 8) : "—";
                const time = r.run_id ? r.run_id.substring(9, 15) : "—";
                const formattedDate = date !== "—" 
                    ? `${date.substring(0,4)}-${date.substring(4,6)}-${date.substring(6,8)}` 
                    : "—";
                const formattedTime = time !== "—"
                    ? `${time.substring(0,2)}:${time.substring(2,4)}:${time.substring(4,6)}`
                    : "—";

                rows += `<tr>
                    <td style="font-family:monospace;font-size:11px">${r.run_id || "—"}</td>
                    <td>${r.test_name || "—"}</td>
                    <td>${formattedDate}</td>
                    <td>${formattedTime}</td>
                    <td>${r.steps || "—"}</td>
                    <td><span class="badge ${status}">${status}</span></td>
                    <td style="max-width:300px">${r.verdict || "—"}</td>
                    <td><a href="${r.html_path}" target="_blank">View →</a></td>
                </tr>`;
            }

            tbody.innerHTML = rows;
            document.getElementById("total").textContent = index.length;
            document.getElementById("passes").textContent = passes;
            document.getElementById("fails").textContent = fails;
            document.getElementById("avg-steps").textContent = 
                (totalSteps / index.length).toFixed(1);
        }

        loadReports();
    </script>
</body>
</html>
